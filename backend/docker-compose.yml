services:
  db:
    image: postgres:16-alpine
    container_name: mess_db
    environment:
      POSTGRES_USER: mess
      POSTGRES_PASSWORD: messpass
      POSTGRES_DB: messdb
    ports:
      - "5432:5432"
    volumes:
      - mess_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mess -d messdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: mess_api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://mess:messpass@db:5432/messdb
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini

volumes:
  mess_pgdata:
